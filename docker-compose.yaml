services:
  app:
    build: .
    container_name: yii2-weather-app
    ports:
      - "8090:80"
    environment:
      YII_DEBUG: "true"
      YII_ENV: "dev"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: weather_db
      DB_USER: weather_user
      DB_PASSWORD: weather_password
      YII_COOKIE_VALIDATION_KEY: change-this-weather-secret-key
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    container_name: yii2-weather-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: weather_db
      POSTGRES_USER: weather_user
      POSTGRES_PASSWORD: weather_password
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weather_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
